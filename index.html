<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo - Clientes CMO / CRA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #38bdf8;
            --border-color: #334155;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            font-size: 24px;
            color: var(--accent-color);
            margin-bottom: 5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .section-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #f1f5f9;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th {
            background-color: #0f172a;
            color: var(--accent-color);
            padding: 12px 16px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.05em;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            color: #e2e8f0;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #24334d; }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-offline { background-color: rgba(239, 68, 68, 0.2); color: #f87171; }
        .badge-online { background-color: rgba(34, 197, 94, 0.2); color: #4ade80; }

        .search-box {
            width: 100%;
            max-width: 400px;
            padding: 10px 16px;
            background-color: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            margin-bottom: 15px;
            font-size: 14px;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .loading-text {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>📡 PANEL DE MONITOREO EN TIEMPO REAL</h1>
            <p>Última actualización: <span id="fecha-actualizacion">Cargando...</span></p>
        </header>

        <div class="section-card">
            <h2 class="section-title"><i class="fa-solid fa-video" style="color: #38bdf8;"></i> ESTADO CÁMARAS - CLIENTES CMO - CRA</h2>
            <input type="text" id="buscar-camaras" class="search-box" placeholder="🔍 Buscar por nombre de cliente o cámara...">
            
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Current Status</th>
                            <th>Latest Offline Time</th>
                            <th>Total Offline Duration</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-camaras">
                        <tr>
                            <td colspan="4" class="loading-text">Cargando registros...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function cargarDatos() {
            try {
                // Evitamos caché para tener datos inmediatos
                const respuesta = await fetch('datos.json?t=' + new Date().getTime());
                const datos = await respuesta.json();
                
                document.getElementById('fecha-actualizacion').innerText = datos.ultima_actualizacion || 'No disponible';
                
                const tabla = document.getElementById('tabla-camaras');
                tabla.innerHTML = '';
                
                const registros = datos.camaras || [];
                
                if (registros.length === 0) {
                    tabla.innerHTML = '<tr><td colspan="4" class="loading-text">No hay cámaras fuera de línea registradas.</td></tr>';
                    return;
                }
                
                registros.forEach(item => {
                    const fila = document.createElement('tr');
                    
                    const estadoLower = (item['Current Status'] || '').toLowerCase();
                    const badgeClass = estadoLower.includes('online') ? 'badge-online' : 'badge-offline';
                    
                    fila.innerHTML = `
                        <strong style="display:block; padding-top:4px;">${item['Name'] || 'Sin Nombre'}</strong>
                        <td><span class="badge ${badgeClass}">${item['Current Status'] || 'Offline'}</span></td>
                        <td>${item['Latest Offline Time'] || '--:--'}</td>
                        <td>${item['Total Offline Duration'] || '0 min'}</td>
                    `;
                    tabla.appendChild(fila);
                });

                // Lógica del buscador rápido en tiempo real
                document.getElementById('buscar-camaras').addEventListener('input', function(e) {
                    const termino = e.target.value.toLowerCase();
                    const filas = tabla.getElementsByTagName('tr');
                    
                    for (let i = 0; i < filas.length; i++) {
                        const textoFila = filas[i].innerText.toLowerCase();
                        filas[i].style.display = textoFila.includes(termino) ? '' : 'none';
                    }
                });

            } catch (error) {
                console.error("Error al cargar el JSON:", error);
                document.getElementById('tabla-camaras').innerHTML = '<tr><td colspan="4" class="loading-text" style="color: #ef4444;">Error al cargar los datos actualizados.</td></tr>';
            }
        }

        // Ejecutar la carga inmediatamente al abrir la web
        cargarDatos();
    </script>
</body>
</html>
